name: PolicyProof quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Enable pnpm
        run: corepack enable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit and component tests
        run: pnpm test
      - name: Check TypeScript
        run: pnpm typecheck
      - name: Run lint
        run: pnpm lint
      - name: Build production application
        run: pnpm build
