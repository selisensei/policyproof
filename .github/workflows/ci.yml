name: PolicyProof release quality

on:
  pull_request:
  push:
    branches:
      - main
      - release/build-week-submission
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Deterministic verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Check release hygiene
        run: pnpm release:hygiene
      - name: Check documentation links
        run: pnpm release:docs
      - name: Verify deterministic demo and TypeScript
        run: pnpm demo:verify
      - name: Run full Vitest suite
        run: pnpm test
      - name: Run lint
        run: pnpm lint
      - name: Build production application
        run: pnpm build

  browser:
    name: Chromium critical paths
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright
        run: pnpm test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  dependency-audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit production dependencies
        run: pnpm audit --prod
